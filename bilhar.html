<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎱 Pocket Master 2026 - Sinuca Profissional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --felt-green: #1a5c3a;
            --felt-dark: #0d3821;
            --wood-brown: #4a2810;
            --wood-light: #6b3d1f;
            --gold: #ffd700;
            --neon-blue: #00ffff;
            --neon-pink: #ff00ff;
            --ui-bg: rgba(0, 0, 0, 0.85);
            --text-glow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
            padding: 10px;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px var(--neon-blue); }
            to { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px var(--neon-blue), 0 0 40px var(--neon-blue); }
        }

        .header h1 {
            color: white;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            background: var(--ui-bg);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .player-score {
            text-align: center;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .player-score.active {
            animation: pulse 1s infinite;
            background: rgba(0, 255, 255, 0.1);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .player-score h3 {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .player-score .score {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: bold;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold);
        }

        .table-wrapper {
            position: relative;
            background: linear-gradient(145deg, var(--wood-brown), var(--wood-light));
            border-radius: 20px;
            padding: clamp(10px, 3vw, 25px);
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.5),
                inset 0 0 50px rgba(0, 0, 0, 0.3),
                0 0 30px rgba(74, 40, 16, 0.5);
            width: 100%;
        }

        .table-border {
            background: linear-gradient(145deg, #2a1810, #3d2217);
            border-radius: 15px;
            padding: clamp(8px, 2vw, 20px);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            width: 100%;
        }

        #poolTable {
            display: block;
            background: radial-gradient(ellipse at center, var(--felt-green) 0%, var(--felt-dark) 100%);
            border-radius: 10px;
            cursor: crosshair;
            width: 100%;
            height: auto;
            touch-action: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(145deg, var(--neon-blue), #0088aa);
            border: none;
            color: white;
            padding: clamp(10px, 2vw, 15px) clamp(20px, 4vw, 30px);
            border-radius: 25px;
            font-size: clamp(0.9rem, 2vw, 1rem);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 255, 255, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .btn-secondary:hover {
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.5);
        }

        .power-meter {
            position: absolute;
            bottom: clamp(60px, 10vw, 100px);
            left: 50%;
            transform: translateX(-50%);
            width: clamp(150px, 30vw, 300px);
            height: 20px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid var(--neon-blue);
            display: none;
            z-index: 100;
        }

        .power-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
            transition: width 0.1s ease;
        }

        .message-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .message-box {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            padding: clamp(20px, 5vw, 40px);
            border-radius: 20px;
            text-align: center;
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5);
            animation: slideIn 0.5s ease;
            max-width: 90%;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .message-box h2 {
            color: white;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 15px;
            text-shadow: var(--text-glow);
        }

        .message-box p {
            color: #ccc;
            font-size: clamp(1rem, 2vw, 1.2rem);
            margin-bottom: 20px;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .mode-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-btn.active {
            background: var(--neon-blue);
            border-color: var(--neon-blue);
            color: #000;
        }

        .tutorial {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--ui-bg);
            padding: 15px;
            border-radius: 10px;
            color: white;
            max-width: 250px;
            font-size: 0.9rem;
            border-left: 4px solid var(--neon-blue);
            display: none;
            z-index: 200;
        }

        .turn-indicator {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            border: 2px solid var(--neon-blue);
            z-index: 50;
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 0;
            }
            
            .scoreboard {
                flex-direction: row;
                padding: 10px;
            }
            
            .controls {
                gap: 8px;
            }
            
            .btn {
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🎱 Pocket Master 2026</h1>
            <p style="color: #aaa; font-size: 0.9rem;">O Retorno do Clássico</p>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('pvp')">2 Jogadores</button>
            <button class="mode-btn" onclick="setMode('pvc')">vs Computador</button>
        </div>

        <div class="scoreboard">
            <div class="player-score active" id="player1Score">
                <h3>JOGADOR 1</h3>
                <div class="score" id="score1">0</div>
                <div id="player1Type" style="font-size: 0.8rem; margin-top: 5px;"></div>
            </div>
            <div class="player-score" id="player2Score">
                <h3 id="player2Name">JOGADOR 2</h3>
                <div class="score" id="score2">0</div>
                <div id="player2Type" style="font-size: 0.8rem; margin-top: 5px;"></div>
            </div>
        </div>

        <div class="table-wrapper">
            <div class="table-border">
                <canvas id="poolTable"></canvas>
            </div>
            <div class="turn-indicator" id="turnIndicator">Turno: Jogador 1</div>
        </div>

        <div class="power-meter" id="powerMeter">
            <div class="power-bar" id="powerBar"></div>
        </div>

        <div class="controls">
            <button class="btn" onclick="resetGame()">🔄 Nova Partida</button>
            <button class="btn btn-secondary" onclick="toggleSound()">🔊 Som: <span id="soundStatus">ON</span></button>
        </div>
    </div>

    <div class="message-overlay" id="messageOverlay">
        <div class="message-box">
            <h2 id="messageTitle">Vitória!</h2>
            <p id="messageText">Jogador 1 venceu!</p>
            <button class="btn" onclick="closeMessageAndReset()">Jogar Novamente</button>
        </div>
    </div>

    <div class="tutorial" id="tutorial">
        <strong>Como Jogar:</strong><br>
        🎯 Arraste para trás para mirar<br>
        💪 Solte para tacar<br>
        ⚪ Encaçape suas bolas (sólidas ou listradas)<br>
        🏆 Faça a bola 8 por último!
    </div>

    <script>
        // Configuração do Canvas
        const canvas = document.getElementById('poolTable');
        const ctx = canvas.getContext('2d');
        
        // Variáveis do Jogo
        let gameMode = 'pvp'; // 'pvp' ou 'pvc'
        let currentPlayer = 1;
        let scores = { 1: 0, 2: 0 };
        let balls = [];
        let cueBall;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragCurrent = { x: 0, y: 0 };
        let power = 0;
        let soundEnabled = true;
        let gameRunning = false;
        let ballRadius;
        let tableWidth;
        let tableHeight;
        let pocketRadius;
        let player1Type = null; // 'solid' ou 'stripe'
        let player2Type = null;
        let firstShotMade = false; // Primeira tacada feita para definir tipos
        let ballsMoving = false;
        let turnEnded = false;
        let foulOnCue = false;
        
        // Constantes de Física Aprimoradas
        const FRICTION = 0.985;
        const WALL_BOUNCE = 0.7;
        const BALL_BOUNCE = 0.95;
        const MIN_VELOCITY = 0.15;
        const MAX_POWER = 30;
        
        // Cores das Bolas
        const BALL_COLORS = [
            '#ffffff', // Bola branca
            '#ffd700', // 1 - Amarela
            '#0066cc', // 2 - Azul
            '#cc0000', // 3 - Vermelha
            '#660066', // 4 - Roxa
            '#ff8800', // 5 - Laranja
            '#006600', // 6 - Verde
            '#660000', // 7 - Marrom
            '#111111', // 8 - Preta
            '#fff4cc', // 9 - Amarela listrada
            '#cce5ff', // 10 - Azul listrada
            '#ffcccc', // 11 - Vermelha listrada
            '#e5ccff', // 12 - Roxa listrada
            '#ffe5cc', // 13 - Laranja listrada
            '#cce5cc', // 14 - Verde listrada
            '#ffcccc'  // 15 - Marrom listrada
        ];

        // Inicialização
        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            setupEventListeners();
            resetGame();
            showTutorial();
        }

        function resizeCanvas() {
            const wrapper = document.querySelector('.table-border');
            const maxWidth = Math.min(wrapper.clientWidth - 40, 1000);
            const aspectRatio = 2 / 1;
            
            tableWidth = maxWidth;
            tableHeight = maxWidth / aspectRatio;
            
            // Ajustar para telas muito pequenas
            if (tableHeight > window.innerHeight * 0.5) {
                tableHeight = window.innerHeight * 0.5;
                tableWidth = tableHeight * aspectRatio;
            }
            
            canvas.width = tableWidth;
            canvas.height = tableHeight;
            
            ballRadius = Math.max(6, tableWidth / 65);
            pocketRadius = ballRadius * 2.5;
            
            if (!gameRunning) {
                resetGame();
            } else {
                draw();
            }
        }

        function setMode(mode) {
            gameMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('player2Name').textContent = mode === 'pvc' ? 'COMPUTADOR' : 'JOGADOR 2';
            resetGame();
        }

        function resetGame() {
            balls = [];
            scores = { 1: 0, 2: 0 };
            currentPlayer = 1;
            player1Type = null;
            player2Type = null;
            firstShotMade = false;
            updateScoreboard();
            setupBalls();
            gameRunning = true;
            turnEnded = false;
            updateTurnIndicator();
            draw();
        }

        function setupBalls() {
            // Bola branca
            cueBall = {
                x: tableWidth * 0.25,
                y: tableHeight / 2,
                vx: 0,
                vy: 0,
                radius: ballRadius,
                color: BALL_COLORS[0],
                number: 0,
                type: 'cue',
                sunk: false
            };
            balls.push(cueBall);

            // Triângulo de bolas - formação clássica
            const startX = tableWidth * 0.75;
            const startY = tableHeight / 2;
            const rows = 5;
            
            // Ordem específica para garantir bola 8 no centro
            const ballOrder = [1, 9, 2, 10, 8, 3, 11, 7, 14, 4, 13, 6, 12, 5, 15];
            let ballIndex = 0;
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col <= row; col++) {
                    const x = startX + row * ballRadius * 1.732;
                    const y = startY - (row * ballRadius) + (col * ballRadius * 2);
                    
                    const num = ballOrder[ballIndex] || (ballIndex + 1);
                    ballIndex++;
                    
                    balls.push({
                        x: x,
                        y: y,
                        vx: 0,
                        vy: 0,
                        radius: ballRadius,
                        color: BALL_COLORS[num],
                        number: num,
                        type: num === 8 ? 'black' : (num <= 7 ? 'solid' : 'stripe'),
                        sunk: false
                    });
                }
            }
        }

        function setupEventListeners() {
            // Mouse events
            canvas.addEventListener('mousedown', handleInputStart);
            canvas.addEventListener('mousemove', handleInputMove);
            canvas.addEventListener('mouseup', handleInputEnd);
            
            // Touch events
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
        }

        function handleInputStart(e) {
            if (!gameRunning || ballsMoving) return;
            if (gameMode === 'pvc' && currentPlayer === 2) return;
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;
            
            // Verificar se clicou perto da bola branca
            const dist = Math.hypot(x - cueBall.x, y - cueBall.y);
            if (dist < ballRadius * 4) {
                isDragging = true;
                dragStart = { x: cueBall.x, y: cueBall.y };
                dragCurrent = { x, y };
                document.getElementById('powerMeter').style.display = 'block';
            }
        }

        function handleInputMove(e) {
            if (!isDragging) return;
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            dragCurrent.x = (clientX - rect.left) * scaleX;
            dragCurrent.y = (clientY - rect.top) * scaleY;
            
            // Calcular poder baseado na distância do arrasto
            const dx = dragStart.x - dragCurrent.x;
            const dy = dragStart.y - dragCurrent.y;
            const distance = Math.hypot(dx, dy);
            power = Math.min(distance / (tableWidth * 0.25), 1);
            
            document.getElementById('powerBar').style.width = (power * 100) + '%';
            draw();
        }

        function handleInputEnd(e) {
            if (!isDragging) return;
            
            isDragging = false;
            document.getElementById('powerMeter').style.display = 'none';
            
            if (power > 0.05) {
                shoot();
            }
            
            power = 0;
            draw();
        }

        function handleTouchStart(e) {
            e.preventDefault();
            handleInputStart(e);
        }

        function handleTouchMove(e) {
            e.preventDefault();
            handleInputMove(e);
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            handleInputEnd(e);
        }

        function shoot() {
            const dx = dragStart.x - dragCurrent.x;
            const dy = dragStart.y - dragCurrent.y;
            const angle = Math.atan2(dy, dx);
            const speed = Math.min(power * MAX_POWER, MAX_POWER);
            
            cueBall.vx = Math.cos(angle) * speed;
            cueBall.vy = Math.sin(angle) * speed;
            
            firstShotMade = true;
            playSound('shoot');
            
            // Iniciar loop de física
            if (!ballsMoving) {
                ballsMoving = true;
                turnEnded = false;
                updatePhysics();
            }
        }

        function updatePhysics() {
            if (!gameRunning) return;
            
            let anyMoving = false;
            
            // Atualizar posições
            balls.forEach(ball => {
                if (ball.sunk) return;
                
                ball.x += ball.vx;
                ball.y += ball.vy;
                
                // Aplicar atrito
                ball.vx *= FRICTION;
                ball.vy *= FRICTION;
                
                // Parar se muito lento
                if (Math.hypot(ball.vx, ball.vy) < MIN_VELOCITY) {
                    ball.vx = 0;
                    ball.vy = 0;
                } else {
                    anyMoving = true;
                }
                
                // Colisão com paredes
                if (ball.x - ball.radius < 0) {
                    ball.x = ball.radius;
                    ball.vx = -ball.vx * WALL_BOUNCE;
                    playSound('wall');
                }
                if (ball.x + ball.radius > tableWidth) {
                    ball.x = tableWidth - ball.radius;
                    ball.vx = -ball.vx * WALL_BOUNCE;
                    playSound('wall');
                }
                if (ball.y - ball.radius < 0) {
                    ball.y = ball.radius;
                    ball.vy = -ball.vy * WALL_BOUNCE;
                    playSound('wall');
                }
                if (ball.y + ball.radius > tableHeight) {
                    ball.y = tableHeight - ball.radius;
                    ball.vy = -ball.vy * WALL_BOUNCE;
                    playSound('wall');
                }
            });
            
            // Colisão entre bolas - física elástica 2D
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const b1 = balls[i];
                    const b2 = balls[j];
                    
                    if (b1.sunk || b2.sunk) continue;
                    
                    const dx = b2.x - b1.x;
                    const dy = b2.y - b1.y;
                    const dist = Math.hypot(dx, dy);
                    const minDist = b1.radius + b2.radius;
                    
                    if (dist < minDist) {
                        // Normalizar vetor de colisão
                        const nx = dx / dist;
                        const ny = dy / dist;
                        
                        // Vetor tangente
                        const tx = -ny;
                        const ty = nx;
                        
                        // Produto escalar tangente
                        const dpTan1 = b1.vx * tx + b1.vy * ty;
                        const dpTan2 = b2.vx * tx + b2.vy * ty;
                        
                        // Produto escalar normal
                        const dpNorm1 = b1.vx * nx + b1.vy * ny;
                        const dpNorm2 = b2.vx * nx + b2.vy * ny;
                        
                        // Conservação de momento (massas iguais)
                        const m1 = 1;
                        const m2 = 1;
                        
                        const momentum1 = (dpNorm1 * (m1 - m2) + 2 * m2 * dpNorm2) / (m1 + m2);
                        const momentum2 = (dpNorm2 * (m2 - m1) + 2 * m1 * dpNorm1) / (m1 + m2);
                        
                        // Atualizar velocidades
                        b1.vx = tx * dpTan1 + nx * momentum1 * BALL_BOUNCE;
                        b1.vy = ty * dpTan1 + ny * momentum1 * BALL_BOUNCE;
                        b2.vx = tx * dpTan2 + nx * momentum2 * BALL_BOUNCE;
                        b2.vy = ty * dpTan2 + ny * momentum2 * BALL_BOUNCE;
                        
                        // Separar bolas para evitar sobreposição
                        const overlap = (minDist - dist) / 2;
                        b1.x -= overlap * nx;
                        b1.y -= overlap * ny;
                        b2.x += overlap * nx;
                        b2.y += overlap * ny;
                        
                        playSound('collision');
                    }
                }
            }
            
            // Verificar caçapas
            checkPockets();
            
            ballsMoving = anyMoving;
            
            // Se todas pararam, verificar fim do turno
            if (!ballsMoving && !turnEnded) {
                turnEnded = true;
                setTimeout(() => checkTurnEnd(), 500);
            }
            
            draw();
            
            if (ballsMoving) {
                requestAnimationFrame(updatePhysics);
            }
        }

        function checkPockets() {
            const pockets = [
                { x: 0, y: 0 },
                { x: tableWidth / 2, y: 0 },
                { x: tableWidth, y: 0 },
                { x: 0, y: tableHeight },
                { x: tableWidth / 2, y: tableHeight },
                { x: tableWidth, y: tableHeight }
            ];
            
            balls.forEach(ball => {
                if (ball.sunk) return;
                
                pockets.forEach(pocket => {
                    const dist = Math.hypot(ball.x - pocket.x, ball.y - pocket.y);
                    if (dist < pocketRadius) {
                        sinkBall(ball);
                    }
                });
            });
        }

        function sinkBall(ball) {
            ball.sunk = true;
            ball.vx = 0;
            ball.vy = 0;
            
            playSound('pocket');
            
            if (ball.number === 0) {
                // Bola branca encaçapada - falta
                foulOnCue = true;
                setTimeout(() => {
                    ball.sunk = false;
                    ball.x = tableWidth * 0.25;
                    ball.y = tableHeight / 2;
                    ball.vx = 0;
                    ball.vy = 0;
                }, 1000);
            } else if (ball.number === 8) {
                // Verificar vitória/derrota
                checkGameEnd();
            }
        }

        function checkTurnEnd() {
            // Verificar quais bolas foram encaçapadas neste turno
            const sunkBalls = balls.filter(b => b.sunk && b.number !== 0 && b.number !== 8);
            
            // Definir tipos de bolas na primeira encaçapada válida
            if (firstShotMade && !player1Type && sunkBalls.length > 0) {
                const firstBall = sunkBalls[0];
                if (currentPlayer === 1) {
                    player1Type = firstBall.type;
                    player2Type = firstBall.type === 'solid' ? 'stripe' : 'solid';
                } else {
                    player2Type = firstBall.type;
                    player1Type = firstBall.type === 'solid' ? 'stripe' : 'solid';
                }
            }
            
            // Verificar se jogador encaçapou bolas do seu tipo
            let scoredValid = false;
            if (player1Type || player2Type) {
                const playerType = currentPlayer === 1 ? player1Type : player2Type;
                scoredValid = sunkBalls.some(b => b.type === playerType);
            }
            
            // Se não encaçapou nada, fez falta, ou não encaçapou bolas válidas, muda turno
            if (foulOnCue || sunkBalls.length === 0 || !scoredValid) {
                currentPlayer = currentPlayer === 1 ? 2 : 1;
                foulOnCue = false;
            }
            // Se encaçapou bolas válidas, continua no mesmo turno
            
            updateScoreboard();
            updateTurnIndicator();
            
            // Se for modo vs computador e turno do computador
            if (gameMode === 'pvc' && currentPlayer === 2 && gameRunning && !ballsMoving) {
                setTimeout(aiShot, 1500);
            }
        }

        function aiShot() {
            if (!gameRunning || currentPlayer !== 2 || ballsMoving) return;
            
            // IA encontra melhor tacada
            const validBalls = balls.filter(b => !b.sunk && b.number !== 0 && b.number !== 8);
            
            if (validBalls.length === 0) {
                // Tentar bola 8
                const blackBall = balls.find(b => b.number === 8 && !b.sunk);
                if (blackBall) {
                    aimAndShoot(blackBall, 0.9);
                }
                return;
            }
            
            // Escolher melhor bola baseada na distância e ângulo
            let bestBall = null;
            let bestScore = -Infinity;
            
            validBalls.forEach(ball => {
                const dist = Math.hypot(ball.x - cueBall.x, ball.y - cueBall.y);
                
                // Verificar se há caminho livre até a bola
                const angleToBall = Math.atan2(ball.y - cueBall.y, ball.x - cueBall.x);
                let pathClear = true;
                
                // Checar obstruções
                for (let other of balls) {
                    if (other === cueBall || other === ball || other.sunk) continue;
                    
                    const distToOther = Math.hypot(other.x - cueBall.x, other.y - cueBall.y);
                    if (distToOther < dist) {
                        const angleToOther = Math.atan2(other.y - cueBall.y, other.x - cueBall.x);
                        const angleDiff = Math.abs(angleToBall - angleToOther);
                        
                        if (angleDiff < 0.2 && distToOther < dist * 0.9) {
                            pathClear = false;
                            break;
                        }
                    }
                }
                
                // Pontuar bola (mais perto = melhor, caminho livre = melhor)
                let score = 1000 / (dist + 1);
                if (pathClear) score *= 1.5;
                
                // Verificar caçapas próximas à bola alvo
                const pockets = [
                    { x: 0, y: 0 },
                    { x: tableWidth / 2, y: 0 },
                    { x: tableWidth, y: 0 },
                    { x: 0, y: tableHeight },
                    { x: tableWidth / 2, y: tableHeight },
                    { x: tableWidth, y: tableHeight }
                ];
                
                pockets.forEach(pocket => {
                    const distToPocket = Math.hypot(ball.x - pocket.x, ball.y - pocket.y);
                    if (distToPocket < 200) {
                        score += 500 / (distToPocket + 1);
                    }
                });
                
                if (score > bestScore && pathClear) {
                    bestScore = score;
                    bestBall = ball;
                }
            });
            
            // Se não encontrou bola boa, escolher aleatória
            if (!bestBall) {
                bestBall = validBalls[Math.floor(Math.random() * validBalls.length)];
            }
            
            // Adicionar erro baseado na dificuldade
            const errorFactor = 0.05 + Math.random() * 0.1;
            aimAndShoot(bestBall, 0.6 + Math.random() * 0.3, errorFactor);
        }

        function aimAndShoot(targetBall, powerLevel = 0.7, errorFactor = 0.05) {
            // Calcular ângulo para atingir a bola alvo
            const angleToBall = Math.atan2(targetBall.y - cueBall.y, targetBall.x - cueBall.x);
            
            // Adicionar pequeno erro
            const errorAngle = (Math.random() - 0.5) * errorFactor;
            const finalAngle = angleToBall + errorAngle;
            
            // Configurar arrasto simulado
            dragStart = { x: cueBall.x, y: cueBall.y };
            const shootDistance = powerLevel * tableWidth * 0.25;
            dragCurrent = {
                x: cueBall.x - Math.cos(finalAngle) * shootDistance,
                y: cueBall.y - Math.sin(finalAngle) * shootDistance
            };
            
            power = powerLevel;
            
            // Executar tacada
            shoot();
        }

        function checkGameEnd() {
            // Contar bolas restantes de cada tipo
            const solidsLeft = balls.filter(b => !b.sunk && b.type === 'solid').length;
            const stripesLeft = balls.filter(b => !b.sunk && b.type === 'stripe').length;
            
            let winner = null;
            let reason = '';
            
            // Se encaçapou a bola 8 antes de limpar suas bolas = derrota
            if (currentPlayer === 1) {
                if (player1Type === 'solid' && solidsLeft > 0) {
                    winner = 2;
                    reason = 'encaçapou a bola 8 muito cedo!';
                } else if (player1Type === 'stripe' && stripesLeft > 0) {
                    winner = 2;
                    reason = 'encaçapou a bola 8 muito cedo!';
                } else if ((!player1Type || solidsLeft === 0 || stripesLeft === 0)) {
                    winner = 1;
                    reason = 'completou todas as bolas!';
                } else {
                    winner = 2;
                    reason = 'venceu!';
                }
            } else {
                if (player2Type === 'solid' && solidsLeft > 0) {
                    winner = 1;
                    reason = 'encaçapou a bola 8 muito cedo!';
                } else if (player2Type === 'stripe' && stripesLeft > 0) {
                    winner = 1;
                    reason = 'encaçapou a bola 8 muito cedo!';
                } else if ((!player2Type || solidsLeft === 0 || stripesLeft === 0)) {
                    winner = 2;
                    reason = 'completou todas as bolas!';
                } else {
                    winner = 1;
                    reason = 'venceu!';
                }
            }
            
            scores[winner]++;
            updateScoreboard();
            
            const winnerName = gameMode === 'pvc' && winner === 2 ? 'Computador' : `Jogador ${winner}`;
            showMessage(
                'Partida Finalizada!',
                `${winnerName} ${reason}`,
                () => {
                    resetGame();
                    closeMessage();
                }
            );
        }

        function closeMessageAndReset() {
            closeMessage();
            resetGame();
        }

        function updateScoreboard() {
            document.getElementById('score1').textContent = scores[1];
            document.getElementById('score2').textContent = scores[2];
            
            document.getElementById('player1Score').classList.toggle('active', currentPlayer === 1);
            document.getElementById('player2Score').classList.toggle('active', currentPlayer === 2);
            
            // Mostrar tipos de bolas
            if (firstShotMade) {
                document.getElementById('player1Type').textContent = player1Type ? 
                    (player1Type === 'solid' ? '🔵 Sólidas' : '⚪ Listradas') : '';
                document.getElementById('player2Type').textContent = player2Type ? 
                    (player2Type === 'solid' ? '🔵 Sólidas' : '⚪ Listradas') : '';
            }
        }

        function updateTurnIndicator() {
            const indicator = document.getElementById('turnIndicator');
            const playerName = gameMode === 'pvc' && currentPlayer === 2 ? 'Computador' : `Jogador ${currentPlayer}`;
            indicator.textContent = `Turno: ${playerName}`;
            
            // Cor diferente para cada jogador
            indicator.style.borderColor = currentPlayer === 1 ? 'var(--neon-blue)' : 'var(--neon-pink)';
        }

        function draw() {
            // Limpar canvas
            ctx.clearRect(0, 0, tableWidth, tableHeight);
            
            // Desenhar caçapas
            drawPockets();
            
            // Desenhar linha de mira
            if (isDragging && !cueBall.sunk) {
                drawAimLine();
            }
            
            // Desenhar bolas
            balls.forEach(ball => {
                if (!ball.sunk) {
                    drawBall(ball);
                }
            });
        }

        function drawPockets() {
            ctx.fillStyle = '#1a1a1a';
            const pockets = [
                { x: 0, y: 0 },
                { x: tableWidth / 2, y: 0 },
                { x: tableWidth, y: 0 },
                { x: 0, y: tableHeight },
                { x: tableWidth / 2, y: tableHeight },
                { x: tableWidth, y: tableHeight }
            ];
            
            pockets.forEach(pocket => {
                ctx.beginPath();
                ctx.arc(pocket.x, pocket.y, pocketRadius, 0, Math.PI * 2);
                ctx.fill();
                
                // Brilho
                const gradient = ctx.createRadialGradient(pocket.x, pocket.y, 0, pocket.x, pocket.y, pocketRadius);
                gradient.addColorStop(0, 'rgba(0, 0, 0, 0.8)');
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = gradient;
                ctx.fill();
            });
            
            ctx.fillStyle = '#1a1a1a';
        }

        function drawBall(ball) {
            ctx.save();
            
            // Sombra
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 3;
            
            // Corpo da bola
            const gradient = ctx.createRadialGradient(
                ball.x - ball.radius * 0.3,
                ball.y - ball.radius * 0.3,
                0,
                ball.x,
                ball.y,
                ball.radius
            );
            gradient.addColorStop(0, lightenColor(ball.color, 50));
            gradient.addColorStop(1, ball.color);
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Número da bola
            if (ball.number > 0) {
                ctx.shadowColor = 'transparent';
                ctx.fillStyle = ball.number === 8 || (ball.number > 7 && ball.type === 'stripe') ? '#ffffff' : '#000000';
                ctx.font = `bold ${ball.radius * 0.8}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Círculo branco para o número
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius * 0.5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#000000';
                ctx.fillText(ball.number.toString(), ball.x, ball.y);
            }
            
            ctx.restore();
        }

        function drawAimLine() {
            ctx.save();
            
            const dx = dragStart.x - dragCurrent.x;
            const dy = dragStart.y - dragCurrent.y;
            const angle = Math.atan2(dy, dx);
            const length = Math.hypot(dx, dy) * 3;
            
            // Linha tracejada
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 10]);
            
            ctx.beginPath();
            ctx.moveTo(cueBall.x, cueBall.y);
            ctx.lineTo(
                cueBall.x + Math.cos(angle) * length,
                cueBall.y + Math.sin(angle) * length
            );
            ctx.stroke();
            
            ctx.restore();
        }

        function lightenColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.min(255, (num >> 16) + amt);
            const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
            const B = Math.min(255, (num & 0x0000FF) + amt);
            return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
        }

        function showMessage(title, text, callback) {
            document.getElementById('messageTitle').textContent = title;
            document.getElementById('messageText').textContent = text;
            document.getElementById('messageOverlay').style.display = 'flex';
            document.getElementById('messageOverlay').onclick = callback;
            document.querySelector('.message-box').onclick = (e) => e.stopPropagation();
        }

        function closeMessage() {
            document.getElementById('messageOverlay').style.display = 'none';
        }

        function showTutorial() {
            const tutorial = document.getElementById('tutorial');
            tutorial.style.display = 'block';
            setTimeout(() => {
                tutorial.style.display = 'none';
            }, 8000);
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundStatus').textContent = soundEnabled ? 'ON' : 'OFF';
        }

        function playSound(type) {
            if (!soundEnabled) return;
            
            // Sons sintetizados simples
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            switch(type) {
                case 'shoot':
                    oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.1);
                    break;
                case 'collision':
                    oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.05);
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.05);
                    break;
                case 'wall':
                    oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(150, audioContext.currentTime + 0.08);
                    gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.08);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.08);
                    break;
                case 'pocket':
                    oscillator.frequency.setValueAtTime(1000, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(300, audioContext.currentTime + 0.15);
                    gainNode.gain.setValueAtTime(0.25, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.15);
                    break;
            }
        }

        // Iniciar jogo
        init();
        
    </script>
