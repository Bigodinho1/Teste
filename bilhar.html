<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎱 Pocket Master 2026 - Sinuca Profissional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --felt-green: #1a5c3a;
            --felt-dark: #0d3821;
            --wood-brown: #4a2810;
            --wood-light: #6b3d1f;
            --gold: #ffd700;
            --neon-blue: #00ffff;
            --neon-pink: #ff00ff;
            --ui-bg: rgba(0, 0, 0, 0.85);
            --text-glow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            padding: 10px;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px var(--neon-blue); }
            to { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px var(--neon-blue), 0 0 40px var(--neon-blue); }
        }

        .header h1 {
            color: white;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            background: var(--ui-bg);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .player-score {
            text-align: center;
            color: white;
        }

        .player-score.active {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .player-score h3 {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .player-score .score {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: bold;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold);
        }

        .table-wrapper {
            position: relative;
            background: linear-gradient(145deg, var(--wood-brown), var(--wood-light));
            border-radius: 20px;
            padding: clamp(10px, 3vw, 25px);
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.5),
                inset 0 0 50px rgba(0, 0, 0, 0.3),
                0 0 30px rgba(74, 40, 16, 0.5);
        }

        .table-border {
            background: linear-gradient(145deg, #2a1810, #3d2217);
            border-radius: 15px;
            padding: clamp(8px, 2vw, 20px);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #poolTable {
            display: block;
            background: radial-gradient(ellipse at center, var(--felt-green) 0%, var(--felt-dark) 100%);
            border-radius: 10px;
            cursor: crosshair;
            width: 100%;
            height: auto;
            touch-action: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(145deg, var(--neon-blue), #0088aa);
            border: none;
            color: white;
            padding: clamp(10px, 2vw, 15px) clamp(20px, 4vw, 30px);
            border-radius: 25px;
            font-size: clamp(0.9rem, 2vw, 1rem);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 255, 255, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .btn-secondary:hover {
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.5);
        }

        .power-meter {
            position: absolute;
            bottom: clamp(60px, 10vw, 100px);
            left: 50%;
            transform: translateX(-50%);
            width: clamp(150px, 30vw, 300px);
            height: 20px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid var(--neon-blue);
            display: none;
        }

        .power-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
            transition: width 0.1s ease;
        }

        .message-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .message-box {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            padding: clamp(20px, 5vw, 40px);
            border-radius: 20px;
            text-align: center;
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5);
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .message-box h2 {
            color: white;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 15px;
            text-shadow: var(--text-glow);
        }

        .message-box p {
            color: #ccc;
            font-size: clamp(1rem, 2vw, 1.2rem);
            margin-bottom: 20px;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .mode-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-btn.active {
            background: var(--neon-blue);
            border-color: var(--neon-blue);
            color: #000;
        }

        .tutorial {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--ui-bg);
            padding: 15px;
            border-radius: 10px;
            color: white;
            max-width: 250px;
            font-size: 0.9rem;
            border-left: 4px solid var(--neon-blue);
            display: none;
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 5px;
            }
            
            .scoreboard {
                flex-direction: row;
                padding: 10px;
            }
            
            .controls {
                gap: 8px;
            }
            
            .btn {
                padding: 8px 16px;
            }
        }

        .ball-indicator {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 0 10px currentColor;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🎱 Pocket Master 2026</h1>
            <p style="color: #aaa; font-size: 0.9rem;">O Retorno do Clássico</p>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('pvp')">2 Jogadores</button>
            <button class="mode-btn" onclick="setMode('pvc')">vs Computador</button>
        </div>

        <div class="scoreboard">
            <div class="player-score active" id="player1Score">
                <h3>JOGADOR 1</h3>
                <div class="score" id="score1">0</div>
            </div>
            <div class="player-score" id="player2Score">
                <h3 id="player2Name">JOGADOR 2</h3>
                <div class="score" id="score2">0</div>
            </div>
        </div>

        <div class="table-wrapper">
            <div class="table-border">
                <canvas id="poolTable"></canvas>
            </div>
        </div>

        <div class="power-meter" id="powerMeter">
            <div class="power-bar" id="powerBar"></div>
        </div>

        <div class="controls">
            <button class="btn" onclick="resetGame()">🔄 Nova Partida</button>
            <button class="btn btn-secondary" onclick="toggleSound()">🔊 Som: <span id="soundStatus">ON</span></button>
        </div>
    </div>

    <div class="message-overlay" id="messageOverlay">
        <div class="message-box">
            <h2 id="messageTitle">Vitória!</h2>
            <p id="messageText">Jogador 1 venceu!</p>
            <button class="btn" onclick="closeMessage()">Continuar</button>
        </div>
    </div>

    <div class="tutorial" id="tutorial">
        <strong>Como Jogar:</strong><br>
        🎯 Arraste para mirar<br>
        💪 Solte para tacar<br>
        ⚪ Encaçape todas as suas bolas<br>
        🏆 Faça a bola 8 por último!
    </div>

    <script>
        // Configuração do Canvas
        const canvas = document.getElementById('poolTable');
        const ctx = canvas.getContext('2d');
        
        // Variáveis do Jogo
        let gameMode = 'pvp'; // 'pvp' ou 'pvc'
        let currentPlayer = 1;
        let scores = { 1: 0, 2: 0 };
        let balls = [];
        let cueBall;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragCurrent = { x: 0, y: 0 };
        let power = 0;
        let isAiming = false;
        let soundEnabled = true;
        let gameRunning = false;
        let ballRadius;
        let tableWidth;
        let tableHeight;
        let pocketRadius;
        
        // Constantes de Física
        const FRICTION = 0.985;
        const WALL_BOUNCE = 0.7;
        const BALL_BOUNCE = 0.9;
        const MIN_VELOCITY = 0.1;
        
        // Cores das Bolas
        const BALL_COLORS = [
            '#ffffff', // Bola branca
            '#ffd700', // 1 - Amarela
            '#0000ff', // 2 - Azul
            '#ff0000', // 3 - Vermelha
            '#800080', // 4 - Roxa
            '#ffa500', // 5 - Laranja
            '#008000', // 6 - Verde
            '#800000', // 7 - Marrom
            '#000000', // 8 - Preta
            '#ffd700', // 9 - Amarela listrada
            '#0000ff', // 10 - Azul listrada
            '#ff0000', // 11 - Vermelha listrada
            '#800080', // 12 - Roxa listrada
            '#ffa500', // 13 - Laranja listrada
            '#008000', // 14 - Verde listrada
            '#800000'  // 15 - Marrom listrada
        ];

        // Inicialização
        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            setupEventListeners();
            resetGame();
            showTutorial();
        }

        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            const maxWidth = Math.min(wrapper.clientWidth - 40, 1000);
            const aspectRatio = 2 / 1;
            
            tableWidth = maxWidth;
            tableHeight = maxWidth / aspectRatio;
            
            // Ajustar para telas muito pequenas
            if (tableHeight > window.innerHeight * 0.6) {
                tableHeight = window.innerHeight * 0.6;
                tableWidth = tableHeight * aspectRatio;
            }
            
            canvas.width = tableWidth;
            canvas.height = tableHeight;
            
            ballRadius = Math.max(8, tableWidth / 60);
            pocketRadius = ballRadius * 2.2;
            
            if (!gameRunning) {
                resetGame();
            } else {
                draw();
            }
        }

        function setMode(mode) {
            gameMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('player2Name').textContent = mode === 'pvc' ? 'COMPUTADOR' : 'JOGADOR 2';
            resetGame();
        }

        function resetGame() {
            balls = [];
            scores = { 1: 0, 2: 0 };
            currentPlayer = 1;
            updateScoreboard();
            setupBalls();
            gameRunning = true;
            draw();
        }

        function setupBalls() {
            // Bola branca
            cueBall = {
                x: tableWidth * 0.25,
                y: tableHeight / 2,
                vx: 0,
                vy: 0,
                radius: ballRadius,
                color: BALL_COLORS[0],
                number: 0,
                type: 'cue',
                player: null,
                sunk: false
            };
            balls.push(cueBall);

            // Triângulo de bolas
            const startX = tableWidth * 0.75;
            const startY = tableHeight / 2;
            const rows = 5;
            let ballNumber = 1;
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col <= row; col++) {
                    const x = startX + row * ballRadius * 1.75;
                    const y = startY - (row * ballRadius) + (col * ballRadius * 2);
                    
                    // Garantir que a bola 8 esteja no meio
                    let num = ballNumber;
                    if (row === 2 && col === 1) {
                        num = 8;
                    } else if (num === 8) {
                        num = ballNumber;
                        ballNumber++;
                    } else {
                        ballNumber++;
                    }
                    
                    balls.push({
                        x: x,
                        y: y,
                        vx: 0,
                        vy: 0,
                        radius: ballRadius,
                        color: BALL_COLORS[num],
                        number: num,
                        type: num === 8 ? 'black' : (num <= 7 ? 'solid' : 'stripe'),
                        player: null,
                        sunk: false
                    });
                }
            }
        }

        function setupEventListeners() {
            // Mouse events
            canvas.addEventListener('mousedown', handleInputStart);
            canvas.addEventListener('mousemove', handleInputMove);
            canvas.addEventListener('mouseup', handleInputEnd);
            
            // Touch events
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
        }

        function handleInputStart(e) {
            if (!gameRunning || isMoving()) return;
            if (gameMode === 'pvc' && currentPlayer === 2) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            
            // Verificar se clicou perto da bola branca
            const dist = Math.hypot(x - cueBall.x, y - cueBall.y);
            if (dist < ballRadius * 3) {
                isDragging = true;
                dragStart = { x: cueBall.x, y: cueBall.y };
                dragCurrent = { x, y };
                document.getElementById('powerMeter').style.display = 'block';
            }
        }

        function handleInputMove(e) {
            if (!isDragging) return;
            
            const rect = canvas.getBoundingClientRect();
            dragCurrent.x = (e.clientX - rect.left) * (canvas.width / rect.width);
            dragCurrent.y = (e.clientY - rect.top) * (canvas.height / rect.height);
            
            // Calcular poder
            const dx = dragStart.x - dragCurrent.x;
            const dy = dragStart.y - dragCurrent.y;
            const distance = Math.hypot(dx, dy);
            power = Math.min(distance / (tableWidth * 0.3), 1);
            
            document.getElementById('powerBar').style.width = (power * 100) + '%';
            draw();
        }

        function handleInputEnd(e) {
            if (!isDragging) return;
            
            isDragging = false;
            document.getElementById('powerMeter').style.display = 'none';
            
            if (power > 0.05) {
                shoot();
            }
            
            power = 0;
            draw();
        }

        function handleTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            handleInputStart({ clientX: touch.clientX, clientY: touch.clientY });
        }

        function handleTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            handleInputMove({ clientX: touch.clientX, clientY: touch.clientY });
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            handleInputEnd(e);
        }

        function shoot() {
            const dx = dragStart.x - dragCurrent.x;
            const dy = dragStart.y - dragCurrent.y;
            const angle = Math.atan2(dy, dx);
            const speed = power * 25;
            
            cueBall.vx = Math.cos(angle) * speed;
            cueBall.vy = Math.sin(angle) * speed;
            
            playSound('shoot');
        }

        function isMoving() {
            return balls.some(ball => Math.hypot(ball.vx, ball.vy) > MIN_VELOCITY);
        }

        function update() {
            if (!gameRunning) return;
            
            // Atualizar posições
            balls.forEach(ball => {
                if (ball.sunk) return;
                
                ball.x += ball.vx;
                ball.y += ball.vy;
                
                // Aplicar atrito
                ball.vx *= FRICTION;
                ball.vy *= FRICTION;
                
                // Parar se muito lento
                if (Math.hypot(ball.vx, ball.vy) < MIN_VELOCITY) {
                    ball.vx = 0;
                    ball.vy = 0;
                }
                
                // Colisão com paredes
                if (ball.x - ball.radius < 0) {
                    ball.x = ball.radius;
                    ball.vx = -ball.vx * WALL_BOUNCE;
                    playSound('wall');
                }
                if (ball.x + ball.radius > tableWidth) {
                    ball.x = tableWidth - ball.radius;
                    ball.vx = -ball.vx * WALL_BOUNCE;
                    playSound('wall');
                }
                if (ball.y - ball.radius < 0) {
                    ball.y = ball.radius;
                    ball.vy = -ball.vy * WALL_BOUNCE;
                    playSound('wall');
                }
                if (ball.y + ball.radius > tableHeight) {
                    ball.y = tableHeight - ball.radius;
                    ball.vy = -ball.vy * WALL_BOUNCE;
                    playSound('wall');
                }
            });
            
            // Colisão entre bolas
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const b1 = balls[i];
                    const b2 = balls[j];
                    
                    if (b1.sunk || b2.sunk) continue;
                    
                    const dx = b2.x - b1.x;
                    const dy = b2.y - b1.y;
                    const dist = Math.hypot(dx, dy);
                    
                    if (dist < b1.radius + b2.radius) {
                        // Colisão detectada
                        const angle = Math.atan2(dy, dx);
                        const sin = Math.sin(angle);
                        const cos = Math.cos(angle);
                        
                        // Rotacionar velocidades
                        const vx1 = b1.vx * cos + b1.vy * sin;
                        const vy1 = b1.vy * cos - b1.vx * sin;
                        const vx2 = b2.vx * cos + b2.vy * sin;
                        const vy2 = b2.vy * cos - b2.vx * sin;
                        
                        // Trocar velocidades
                        const vx1Final = vx2 * BALL_BOUNCE;
                        const vx2Final = vx1 * BALL_BOUNCE;
                        
                        // Rotacionar de volta
                        b1.vx = vx1Final * cos - vy1 * sin;
                        b1.vy = vy1 * cos + vx1Final * sin;
                        b2.vx = vx2Final * cos - vy2 * sin;
                        b2.vy = vy2 * cos + vx2Final * sin;
                        
                        // Separar bolas
                        const overlap = (b1.radius + b2.radius - dist) / 2;
                        b1.x -= overlap * Math.cos(angle);
                        b1.y -= overlap * Math.sin(angle);
                        b2.x += overlap * Math.cos(angle);
                        b2.y += overlap * Math.sin(angle);
                        
                        playSound('collision');
                    }
                }
            }
            
            // Verificar caçapas
            checkPockets();
            
            // Verificar se todas pararam
            if (!isMoving() && gameRunning) {
                setTimeout(() => {
                    if (!isMoving() && gameRunning) {
                        checkTurnEnd();
                    }
                }, 500);
            }
            
            draw();
            requestAnimationFrame(update);
        }

        function checkPockets() {
            const pockets = [
                { x: 0, y: 0 },
                { x: tableWidth / 2, y: -10 },
                { x: tableWidth, y: 0 },
                { x: 0, y: tableHeight },
                { x: tableWidth / 2, y: tableHeight + 10 },
                { x: tableWidth, y: tableHeight }
            ];
            
            balls.forEach(ball => {
                if (ball.sunk) return;
                
                pockets.forEach(pocket => {
                    const dist = Math.hypot(ball.x - pocket.x, ball.y - pocket.y);
                    if (dist < pocketRadius) {
                        sinkBall(ball);
                    }
                });
            });
        }

        function sinkBall(ball) {
            ball.sunk = true;
            ball.vx = 0;
            ball.vy = 0;
            
            playSound('pocket');
            
            if (ball.number === 0) {
                // Bola branca encaçapada
                setTimeout(() => {
                    ball.sunk = false;
                    ball.x = tableWidth * 0.25;
                    ball.y = tableHeight / 2;
                    ball.vx = 0;
                    ball.vy = 0;
                }, 1000);
            } else if (ball.number === 8) {
                // Verificar vitória/derrota
                checkGameEnd();
            }
        }

        function checkTurnEnd() {
            // Lógica simples de turno
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateScoreboard();
            
            if (gameMode === 'pvc' && currentPlayer === 2 && gameRunning) {
                setTimeout(aiShot, 1000);
            }
        }

        function aiShot() {
            if (!gameRunning || currentPlayer !== 2) return;
            
            // IA simples: encontrar bola mais próxima e tacar
            const validBalls = balls.filter(b => !b.sunk && b.number !== 0 && b.number !== 8);
            
            if (validBalls.length === 0) {
                // Tentar bola 8
                const blackBall = balls.find(b => b.number === 8 && !b.sunk);
                if (blackBall) {
                    aimAndShoot(blackBall);
                }
                return;
            }
            
            // Escolher bola aleatória válida
            const targetBall = validBalls[Math.floor(Math.random() * validBalls.length)];
            aimAndShoot(targetBall);
        }

        function aimAndShoot(targetBall) {
            // Mirar na bola alvo
            const angle = Math.atan2(targetBall.y - cueBall.y, targetBall.x - cueBall.x);
            const distance = Math.hypot(targetBall.x - cueBall.x, targetBall.y - cueBall.y);
            
            // Poder baseado na distância
            power = Math.min(0.5 + Math.random() * 0.3, 0.9);
            
            // Adicionar pequeno erro
            const errorAngle = (Math.random() - 0.5) * 0.1;
            
            dragStart = { x: cueBall.x, y: cueBall.y };
            dragCurrent = {
                x: cueBall.x - Math.cos(angle + errorAngle) * power * tableWidth * 0.3,
                y: cueBall.y - Math.sin(angle + errorAngle) * power * tableWidth * 0.3
            };
            
            shoot();
        }

        function checkGameEnd() {
            const player1Balls = balls.filter(b => !b.sunk && b.player === 1).length;
            const player2Balls = balls.filter(b => !b.sunk && b.player === 2).length;
            
            let winner = null;
            
            if (currentPlayer === 1) {
                winner = player1Balls === 0 ? 1 : 2;
            } else {
                winner = player2Balls === 0 ? 2 : 1;
            }
            
            scores[winner]++;
            updateScoreboard();
            
            showMessage(
                'Partida Finalizada!',
                `Jogador ${winner} venceu!`,
                () => {
                    resetGame();
                    closeMessage();
                }
            );
        }

        function updateScoreboard() {
            document.getElementById('score1').textContent = scores[1];
            document.getElementById('score2').textContent = scores[2];
            
            document.getElementById('player1Score').classList.toggle('active', currentPlayer === 1);
            document.getElementById('player2Score').classList.toggle('active', currentPlayer === 2);
        }

        function draw() {
            // Limpar canvas
            ctx.clearRect(0, 0, tableWidth, tableHeight);
            
            // Desenhar caçapas
            drawPockets();
            
            // Desenhar linha de mira
            if (isDragging && !cueBall.sunk) {
                drawAimLine();
            }
            
            // Desenhar bolas
            balls.forEach(ball => {
                if (!ball.sunk) {
                    drawBall(ball);
                }
            });
        }

        function drawPockets() {
            ctx.fillStyle = '#1a1a1a';
            const pockets = [
                { x: 0, y: 0 },
                { x: tableWidth / 2, y: 0 },
                { x: tableWidth, y: 0 },
                { x: 0, y: tableHeight },
                { x: tableWidth / 2, y: tableHeight },
                { x: tableWidth, y: tableHeight }
            ];
            
            pockets.forEach(pocket => {
                ctx.beginPath();
                ctx.arc(pocket.x, pocket.y, pocketRadius, 0, Math.PI * 2);
                ctx.fill();
                
                // Brilho
                const gradient = ctx.createRadialGradient(pocket.x, pocket.y, 0, pocket.x, pocket.y, pocketRadius);
                gradient.addColorStop(0, 'rgba(0, 0, 0, 0.8)');
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = gradient;
                ctx.fill();
            });
            
            ctx.fillStyle = '#1a1a1a';
        }

        function drawBall(ball) {
            ctx.save();
            
            // Sombra
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 3;
            
            // Corpo da bola
            const gradient = ctx.createRadialGradient(
                ball.x - ball.radius * 0.3,
                ball.y - ball.radius * 0.3,
                0,
                ball.x,
                ball.y,
                ball.radius
            );
            gradient.addColorStop(0, lightenColor(ball.color, 50));
            gradient.addColorStop(1, ball.color);
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Número da bola
            if (ball.number > 0) {
                ctx.shadowColor = 'transparent';
                ctx.fillStyle = ball.number === 8 || (ball.number > 7 && ball.type === 'stripe') ? '#ffffff' : '#000000';
                ctx.font = `bold ${ball.radius * 0.8}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Círculo branco para o número
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius * 0.5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#000000';
                ctx.fillText(ball.number.toString(), ball.x, ball.y);
            }
            
            ctx.restore();
        }

        function drawAimLine() {
            ctx.save();
            
            const dx = dragStart.x - dragCurrent.x;
            const dy = dragStart.y - dragCurrent.y;
            const angle = Math.atan2(dy, dx);
            const length = Math.hypot(dx, dy) * 3;
            
            // Linha tracejada
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 10]);
            
            ctx.beginPath();
            ctx.moveTo(cueBall.x, cueBall.y);
            ctx.lineTo(
                cueBall.x + Math.cos(angle) * length,
                cueBall.y + Math.sin(angle) * length
            );
            ctx.stroke();
            
            ctx.restore();
        }

        function lightenColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.min(255, (num >> 16) + amt);
            const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
            const B = Math.min(255, (num & 0x0000FF) + amt);
            return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
        }

        function showMessage(title, text, callback) {
            document.getElementById('messageTitle').textContent = title;
            document.getElementById('messageText').textContent = text;
            document.getElementById('messageOverlay').style.display = 'flex';
            document.getElementById('messageOverlay').onclick = callback;
            document.querySelector('.message-box').onclick = (e) => e.stopPropagation();
        }

        function closeMessage() {
            document.getElementById('messageOverlay').style.display = 'none';
        }

        function showTutorial() {
            const tutorial = document.getElementById('tutorial');
            tutorial.style.display = 'block';
            setTimeout(() => {
                tutorial.style.display = 'none';
            }, 8000);
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundStatus').textContent = soundEnabled ? 'ON' : 'OFF';
        }

        function playSound(type) {
            if (!soundEnabled) return;
            
            // Sons sintetizados simples
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            switch(type) {
                case 'shoot':
                    oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.1);
                    break;
                case 'collision':
                    oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.05);
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.05);
                    break;
                case 'wall':
                    oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(150, audioContext.currentTime + 0.08);
                    gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.08);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.08);
                    break;
                case 'pocket':
                    oscillator.frequency.setValueAtTime(1000, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(300, audioContext.currentTime + 0.15);
                    gainNode.gain.setValueAtTime(0.25, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.15);
                    break;
            }
        }

        // Iniciar jogo
        init();
        update();
    </script>
</body>
</html>
