<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mini Golf Masters 2026</title>
    <style>
        :root {
            --bg: #080c16;
            --surface: rgba(18, 22, 40, 0.85);
            --surface2: rgba(25, 30, 55, 0.9);
            --accent: #00e5a0;
            --accent2: #7c5cfc;
            --accent3: #ff5e8a;
            --gold: #f0c040;
            --text: #e8e8f0;
            --text2: #b0b5c8;
            --player: #4df0ea;
            --computer: #ff7b5c;
            --danger: #ff3d5c;
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            --radius: 20px;
            --radius-sm: 12px;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(124, 92, 252, 0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 70% 70%, rgba(0, 229, 160, 0.08) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 94, 138, 0.05) 0%, transparent 60%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: var(--font);
            overflow: hidden;
            touch-action: manipulation;
            padding: 10px;
        }

        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: var(--glass-shadow);
            flex-wrap: wrap;
            gap: 8px;
        }
        .game-header .title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--accent), var(--player));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .game-header .hole-info {
            font-size: 0.9rem;
            color: var(--text2);
            font-weight: 500;
        }
        .game-header .hole-info span {
            color: var(--gold);
            font-weight: 700;
        }

        .scoreboard {
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .score-chip {
            padding: 8px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--glass-border);
            background: var(--surface2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .score-chip.player {
            color: var(--player);
            border-color: rgba(77, 240, 234, 0.3);
        }
        .score-chip.computer {
            color: var(--computer);
            border-color: rgba(255, 123, 92, 0.3);
        }
        .score-chip .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .score-chip.player .dot {
            background: var(--player);
            box-shadow: 0 0 10px var(--player);
        }
        .score-chip.computer .dot {
            background: var(--computer);
            box-shadow: 0 0 10px var(--computer);
        }

        .canvas-container {
            position: relative;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--glass-border);
            overflow: hidden;
            box-shadow: var(--glass-shadow);
            aspect-ratio: 800 / 500;
            width: 100%;
            cursor: crosshair;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: var(--radius);
        }

        .power-indicator {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            height: 6px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            width: 60%;
            max-width: 300px;
            overflow: hidden;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .power-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent3));
            border-radius: 10px;
            transition: width 0.05s linear;
            box-shadow: 0 0 12px rgba(255, 94, 138, 0.6);
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(8, 12, 22, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            z-index: 10;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: opacity 0.4s;
        }
        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .overlay-panel {
            background: var(--surface2);
            border-radius: var(--radius);
            padding: 30px 24px;
            text-align: center;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            max-width: 440px;
            width: 90%;
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .overlay-panel h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }
        .overlay-panel .subtitle {
            font-size: 0.9rem;
            color: var(--text2);
            margin-bottom: 20px;
        }
        .mode-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .mode-btn {
            padding: 16px 10px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--glass-border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-family: var(--font);
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
            letter-spacing: -0.2px;
        }
        .mode-btn:hover,
        .mode-btn:active {
            border-color: var(--accent);
            background: rgba(0, 229, 160, 0.08);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 229, 160, 0.2);
        }
        .mode-btn .holes-num {
            display: block;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--player));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 2px;
        }
        .mode-btn .holes-label {
            font-size: 0.75rem;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            padding: 14px 32px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, var(--accent), #00c98a);
            color: #000;
            cursor: pointer;
            font-family: var(--font);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: -0.2px;
            transition: all 0.3s;
            box-shadow: 0 6px 25px rgba(0, 229, 160, 0.35);
        }
        .btn-primary:hover,
        .btn-primary:active {
            transform: translateY(-2px);
            box-shadow: 0 10px 35px rgba(0, 229, 160, 0.5);
        }
        .btn-secondary {
            padding: 10px 22px;
            border-radius: 30px;
            border: 2px solid var(--glass-border);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-family: var(--font);
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .btn-secondary:hover,
        .btn-secondary:active {
            border-color: var(--accent2);
            background: rgba(124, 92, 252, 0.1);
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.9rem;
            color: var(--text);
        }
        .result-row .winner-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .winner-badge.win {
            background: rgba(0, 229, 160, 0.2);
            color: var(--accent);
        }
        .winner-badge.lose {
            background: rgba(255, 61, 92, 0.2);
            color: var(--danger);
        }
        .winner-badge.tie {
            background: rgba(240, 192, 64, 0.2);
            color: var(--gold);
        }

        .stroke-flash {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 3rem;
            font-weight: 900;
            pointer-events: none;
            z-index: 20;
            animation: popFlash 0.7s ease-out forwards;
            color: var(--text);
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.8);
        }
        @keyframes popFlash {
            0% {
                transform: translate(-50%, -50%) scale(0.3);
                opacity: 1;
            }
            60% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 0.9;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.8);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            .game-header {
                padding: 8px 12px;
                gap: 4px;
            }
            .game-header .title {
                font-size: 1rem;
            }
            .score-chip {
                padding: 6px 10px;
                font-size: 0.75rem;
            }
            .overlay-panel {
                padding: 20px 14px;
            }
            .overlay-panel h2 {
                font-size: 1.3rem;
            }
            .mode-btn {
                padding: 12px 8px;
            }
            .mode-btn .holes-num {
                font-size: 1.5rem;
            }
            .power-indicator {
                bottom: 8px;
                width: 70%;
            }
        }
        @media (max-width: 380px) {
            .mode-grid {
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }
            .mode-btn {
                padding: 10px 6px;
                font-size: 0.75rem;
            }
            .mode-btn .holes-num {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper" id="gameWrapper">
        <div class="game-header">
            <div class="title">⛳ Mini Golf Masters</div>

                <div class="score-chip computer"><span class="dot"></span> CPU: <strong id="cpuScore">0</strong></div>
            </div>
        </div>
        <div class="canvas-container" id="canvasContainer">
            <canvas id="gameCanvas"></canvas>
            <div class="power-indicator" id="powerIndicator"><div class="power-fill" id="powerFill"></div></div>
            <div class="overlay" id="overlay">
                <div class="overlay-panel" id="overlayPanel"></div>
            </div>
        </div>
    </div>

                        { x1: 0, y1: 500, x2: 800, y2: 500 },
                        { x1: 180, y1: 130, x2: 220, y2: 370 },
                        { x1: 400, y1: 100, x2: 400, y2: 220 },
                        { x1: 400, y1: 280, x2: 400, y2: 400 },
                        { x1: 580, y1: 130, x2: 620, y2: 370 },
                    ],
                    obstacles: [
                        { cx: 310, cy: 250, r: 22 },
                        { cx: 500, cy: 250, r: 22 },
                    ],
                    waterZones: [
                        { x: 400, y: 250, r: 25 },
                    ],
                    sandZones: [],
                    movingObs: [
                        { cx: 400, cy: 160, type: 'oscillator', angle: 0, speed: 0.03, bladeLength: 50,
                            bladeWidth: 30, oscillateX: 0, oscillateY: 0, baseX: 400, baseY: 160,
                            rangeX: 0, rangeY: 60 },
                    ],
                });

                return holes;
            }

            const allHoles = createHoles();

            // ==================== RESIZE / RESPONSIVE ====================
            function resize() {
                const containerW = container.clientWidth;
                const containerH = container.clientHeight;
                const aspect = INTERNAL_W / INTERNAL_H;

                let displayW, displayH;
                if (containerW / containerH > aspect) {
                    displayH = containerH;
                    displayW = displayH * aspect;
                } else {
                    displayW = containerW;
                    displayH = displayW / aspect;
                }

                canvas.style.width = displayW + 'px';
                canvas.style.height = displayH + 'px';
                canvas.width = INTERNAL_W;
                canvas.height = INTERNAL_H;
                scale = INTERNAL_W / displayW;
                offsetX = (containerW - displayW) / 2;
                offsetY = (containerH - displayH) / 2;
            }

            function screenToInternal(screenX, screenY) {
                const rect = canvas.getBoundingClientRect();
                const sx = screenX - rect.left;
                const sy = screenY - rect.top;
                return {
                    x: sx * scale,
                    y: sy * scale,
                };
            }

            window.addEventListener('resize', resize);
            window.addEventListener('orientationchange', () => setTimeout(resize, 200));

            // ==================== PARTICLES ====================
            function spawnParticles(x, y, count, color) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 1.5 + Math.random() * 4;
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1,
                        decay: 0.02 + Math.random() * 0.04,
                        color,
                        size: 2 + Math.random() * 4,
                    });
                }
            }

            function updateParticles() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    if (p.life <= 0) particles.splice(i, 1);
                }
            }

            function drawParticles(ctx) {
                for (const p of particles) {
                    ctx.fillStyle = p.color.replace('1)', `${p.life})`).replace('rgb',
                        'rgba');
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // ==================== PHYSICS & COLLISION ====================
            function closestPointOnSegment(px, py, x1, y1, x2, y2) {
                const dx = x2 - x1;
                const dy = y2 - y1;
                const lenSq = dx * dx + dy * dy;
                if (lenSq === 0) return { x: x1, y: y1, t: 0 };
                let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
                t = Math.max(0, Math.min(1, t));
                return { x: x1 + t * dx, y: y1 + t * dy, t };
            }

            function handleWallCollisions() {
                const allWalls = currentHoleData.walls;
                for (const wall of allWalls) {
                    const closest = closestPointOnSegment(ballX, ballY, wall.x1, wall.y1, wall.x2, wall.y2);
                    const dx = ballX - closest.x;
                    const dy = ballY - closest.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const ballRadius = 8;
                    if (dist < ballRadius && dist > 0.001) {
                        const nx = dx / dist;
                        const ny = dy / dist;
                        const overlap = ballRadius - dist;
                        ballX += nx * overlap;
                        ballY += ny * overlap;
                        const dot = ballVX * nx + ballVY * ny;
                        if (dot < 0) {
                            ballVX -= 2 * dot * nx;
                            ballVY -= 2 * dot * ny;
                            ballVX *= 0.7;
                            ballVY *= 0.7;
                        }
                    }
                }
                // Bounds clamping
                const br = 8;
                if (ballX < br) { ballX = br;
                    ballVX = Math.abs(ballVX) * 0.6; }
                if (ballX > INTERNAL_W - br) { ballX = INTERNAL_W - br;
                    ballVX = -Math.abs(ballVX) * 0.6; }
                if (ballY < br) { ballY = br;
                    ballVY = Math.abs(ballVY) * 0.6; }
                if (ballY > INTERNAL_H - br) { ballY = INTERNAL_H - br;
                    ballVY = -Math.abs(ballVY) * 0.6; }
            }

            function handleObstacleCollisions() {
                if (!currentHoleData) return;
                for (const obs of currentHoleData.obstacles) {
                    const dx = ballX - obs.cx;
                    const dy = ballY - obs.cy;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const minDist = 8 + obs.r;
                    if (dist < minDist && dist > 0.001) {
                        const nx = dx / dist;
                        const ny = dy / dist;
                        const overlap = minDist - dist;
                        ballX += nx * overlap;
                        ballY += ny * overlap;
                        const dot = ballVX * nx + ballVY * ny;
                        if (dot < 0) {
                            ballVX -= 2 * dot * nx;
                            ballVY -= 2 * dot * ny;
                            ballVX *= 0.75;
                            ballVY *= 0.75;
                        }
                    }
                }
                // Moving obstacles
                for (const mo of currentHoleData.movingObs) {
                    if (mo.type === 'windmill') {
                        for (let b = 0; b < 4; b++) {
                            const bladeAngle = mo.angle + (b * Math.PI) / 2;
                            const bx = mo.cx + Math.cos(bladeAngle) * mo.bladeLength * 0.5;
                            const by = mo.cy + Math.sin(bladeAngle) * mo.bladeLength * 0.5;
                            const bdx = Math.cos(bladeAngle);
                            const bdy = Math.sin(bladeAngle);
                            const bx1 = mo.cx + bdx * mo.bladeLength;
                            const by1 = mo.cy + bdy * mo.bladeLength;
                            const closest = closestPointOnSegment(ballX, ballY, mo.cx, mo.cy, bx1, by1);
                            const dx = ballX - closest.x;
                            const dy = ballY - closest.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            const minD = 8 + mo.bladeWidth / 2;
                            if (dist < minD && dist > 0.001) {
                                const nx = dx / dist;
                                const ny = dy / dist;
                                ballX += nx * (minD - dist);
                                ballY += ny * (minD - dist);
                                const dot = ballVX * nx + ballVY * ny;
                                if (dot < 0) {
                                    ballVX -= 2 * dot * nx;
                                    ballVY -= 2 * dot * ny;
                                    ballVX *= 0.6;
                                    ballVY *= 0.6;
                                }
                            }
                        }
                    } else if (mo.type === 'oscillator') {
                        const ocx = mo.baseX + Math.sin(mo.angle) * mo.rangeY;
                        const ocy = mo.baseY + Math.cos(mo.angle) * mo.rangeY;
                        const dx = ballX - ocx;
                        const dy = ballY - ocy;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const minD = 8 + mo.bladeWidth / 2;
                        if (dist < minD && dist > 0.001) {
                            const nx = dx / dist;
                            const ny = dy / dist;
                            ballX += nx * (minD - dist);
                            ballY += ny * (minD - dist);
                            const dot = ballVX * nx + ballVY * ny;
                            if (dot < 0) {
                                ballVX -= 2 * dot * nx;
                                ballVY -= 2 * dot * ny;
                                ballVX *= 0.6;
                                ballVY *= 0.6;
                            }
                        }
                    }
                }
            }

            function isInWater(x, y) {
                if (!currentHoleData) return false;
                for (const wz of currentHoleData.waterZones) {
                    const dx = x - wz.x;
                    const dy = y - wz.y;
                    if (Math.sqrt(dx * dx + dy * dy) < wz.r) return true;
                }
                return false;
            }

            function isInSand(x, y) {
                if (!currentHoleData) return false;
                for (const sz of currentHoleData.sandZones) {
                    const dx = x - sz.x;
                    const dy = y - sz.y;
                    if (Math.sqrt(dx * dx + dy * dy) < sz.r) return true;
                }
                return false;
            }

            function isInHole(x, y) {
                const dx = x - currentHoleData.holeX;
                const dy = y - currentHoleData.holeY;
                return Math.sqrt(dx * dx + dy * dy) < HOLE_RADIUS;
            }

            // ==================== RENDERING ====================
            function drawHole(ctx) {
                const hd = currentHoleData;
                // Background - grass texture feel
                const grassGrad = ctx.createRadialGradient(400, 250, 50, 400, 250, 600);
                grassGrad.addColorStop(0, '#2d5a3f');
                grassGrad.addColorStop(0.7, '#1a3d28');
                grassGrad.addColorStop(1, '#0f2818');
                ctx.fillStyle = grassGrad;
                ctx.fillRect(0, 0, INTERNAL_W, INTERNAL_H);

                // Subtle grid
                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                ctx.lineWidth = 0.5;
                for (let gx = 0; gx < INTERNAL_W; gx += 40) {
                    ctx.beginPath();
                    ctx.moveTo(gx, 0);
                    ctx.lineTo(gx, INTERNAL_H);
                    ctx.stroke();
                }
                for (let gy = 0; gy < INTERNAL_H; gy += 40) {
                    ctx.beginPath();
                    ctx.moveTo(0, gy);
                    ctx.lineTo(INTERNAL_W, gy);
                    ctx.stroke();
                }

                // Water zones
                for (const wz of hd.waterZones) {
                    const wGrad = ctx.createRadialGradient(wz.x, wz.y, wz.r * 0.4, wz.x, wz.y, wz.r);
                    wGrad.addColorStop(0, 'rgba(30,120,200,0.7)');
                    wGrad.addColorStop(0.7, 'rgba(15,60,140,0.8)');
                    wGrad.addColorStop(1, 'rgba(5,30,80,0.9)');
                    ctx.fillStyle = wGrad;
                    ctx.beginPath();
                    ctx.arc(wz.x, wz.y, wz.r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(100,180,255,0.5)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    // Ripple effect
                    ctx.strokeStyle = 'rgba(180,220,255,0.3)';
                    ctx.lineWidth = 1;
                    for (let r = 0; r < 3; r++) {
                        ctx.beginPath();
                        ctx.arc(wz.x, wz.y, wz.r * (0.5 + r * 0.18), 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }

                // Sand zones
                for (const sz of hd.sandZones) {
                    const sGrad = ctx.createRadialGradient(sz.x, sz.y, sz.r * 0.3, sz.x, sz.y, sz.r);
                    sGrad.addColorStop(0, 'rgba(210,180,130,0.7)');
                    sGrad.addColorStop(1, 'rgba(160,130,80,0.8)');
                    ctx.fillStyle = sGrad;
                    ctx.beginPath();
                    ctx.arc(sz.x, sz.y, sz.r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(180,150,100,0.4)';
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([4, 4]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                // Walls
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                for (const wall of hd.walls) {
                    ctx.beginPath();
                    ctx.moveTo(wall.x1, wall.y1);
                    ctx.lineTo(wall.x2, wall.y2);
                    ctx.stroke();
                }
                // Wall glow
                ctx.strokeStyle = 'rgba(200,220,255,0.15)';
                ctx.lineWidth = 8;
                for (const wall of hd.walls) {
                    ctx.beginPath();
                    ctx.moveTo(wall.x1, wall.y1);
                    ctx.lineTo(wall.x2, wall.y2);
                    ctx.stroke();
                }

                // Obstacles (bumpers)
                for (const obs of hd.obstacles) {
                    const oGrad = ctx.createRadialGradient(obs.cx - 5, obs.cy - 5, obs.r * 0.2, obs.cx, obs.cy, obs.r);
                    oGrad.addColorStop(0, '#ff8877');
                    oGrad.addColorStop(0.6, '#d4453a');
                    oGrad.addColorStop(1, '#8b1a1a');
                    ctx.fillStyle = oGrad;
                    ctx.beginPath();
                    ctx.arc(obs.cx, obs.cy, obs.r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,200,180,0.6)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    // Highlight
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.beginPath();
                    ctx.arc(obs.cx - obs.r * 0.25, obs.cy - obs.r * 0.25, obs.r * 0.35, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Moving obstacles
                for (const mo of hd.movingObs) {
                    if (mo.type === 'windmill') {
                        ctx.fillStyle = 'rgba(180,180,200,0.5)';
                        ctx.strokeStyle = 'rgba(220,220,240,0.7)';
                        ctx.lineWidth = 2;
                        for (let b = 0; b < 4; b++) {
                            const bladeAngle = mo.angle + (b * Math.PI) / 2;
                            const bx1 = mo.cx + Math.cos(bladeAngle) * mo.bladeLength;
                            const by1 = mo.cy + Math.sin(bladeAngle) * mo.bladeLength;
                            ctx.save();
                            ctx.translate(mo.cx, mo.cy);
                            ctx.rotate(bladeAngle);
                            ctx.fillStyle = 'rgba(200,180,160,0.7)';
                            ctx.fillRect(-mo.bladeWidth / 2, 0, mo.bladeWidth, mo.bladeLength);
                            ctx.strokeStyle = 'rgba(255,240,220,0.8)';
                            ctx.strokeRect(-mo.bladeWidth / 2, 0, mo.bladeWidth, mo.bladeLength);
                            ctx.restore();
                        }
                        ctx.fillStyle = '#555';
                        ctx.beginPath();
                        ctx.arc(mo.cx, mo.cy, 10, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = '#888';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    } else if (mo.type === 'oscillator') {
                        const ocx = mo.baseX + Math.sin(mo.angle) * mo.rangeY;
                        const ocy = mo.baseY + Math.cos(mo.angle) * mo.rangeY;
                        ctx.fillStyle = 'rgba(200,150,100,0.8)';
                        ctx.fillRect(ocx - mo.bladeWidth / 2, ocy - mo.bladeWidth / 2, mo.bladeWidth, mo.bladeWidth);
                        ctx.strokeStyle = 'rgba(255,200,150,0.9)';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(ocx - mo.bladeWidth / 2, ocy - mo.bladeWidth / 2, mo.bladeWidth, mo.bladeWidth);
                    }
                }

                // Hole
                const holeGrad = ctx.createRadialGradient(hd.holeX, hd.holeY, HOLE_RADIUS * 0.2, hd.holeX, hd.holeY,
                    HOLE_RADIUS);
                holeGrad.addColorStop(0, '#000');
                holeGrad.addColorStop(0.7, '#1a0a00');
                holeGrad.addColorStop(1, '#3d2a10');
                ctx.fillStyle = holeGrad;
                ctx.beginPath();
                ctx.arc(hd.holeX, hd.holeY, HOLE_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,200,50,0.7)';
                ctx.lineWidth = 3;
                ctx.stroke();
                // Glow ring
                ctx.strokeStyle = 'rgba(255,180,30,0.35)';
                ctx.lineWidth = 8;
                ctx.beginPath();
                ctx.arc(hd.holeX, hd.holeY, HOLE_RADIUS + 4, 0, Math.PI * 2);
                ctx.stroke();
                // Flag
                ctx.fillStyle = '#fff';
                ctx.fillRect(hd.holeX - 1, hd.holeY - HOLE_RADIUS - 20, 2, 20);
                ctx.fillStyle = '#ff3b3b';
                ctx.beginPath();
                ctx.moveTo(hd.holeX + 1, hd.holeY - HOLE_RADIUS - 20);
                ctx.lineTo(hd.holeX + 16, hd.holeY - HOLE_RADIUS - 14);
                ctx.lineTo(hd.holeX + 1, hd.holeY - HOLE_RADIUS - 8);
                ctx.fill();

                // Start marker
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath();
                ctx.arc(hd.startX, hd.startY, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath();
                ctx.arc(hd.startX, hd.startY, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('START', hd.startX, hd.startY - 16);
            }

            function drawBall(ctx, x, y, owner) {
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath();
                ctx.arc(x + 2, y + 2, 8, 0, Math.PI * 2);
                ctx.fill();
                // Ball
                const ballGrad = ctx.createRadialGradient(x - 2, y - 2, 1, x, y, 8);
                if (owner === 'player') {
                    ballGrad.addColorStop(0, '#ffffff');
                    ballGrad.addColorStop(0.5, '#e0f8ff');
                    ballGrad.addColorStop(1, '#3cc8e8');
                } else {
                    ballGrad.addColorStop(0, '#ffffff');
                    ballGrad.addColorStop(0.5, '#ffe8e0');
                    ballGrad.addColorStop(1, '#e8553c');
                }
                ctx.fillStyle = ballGrad;
                ctx.beginPath();
                ctx.arc(x, y, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // Glow
                const glowGrad = ctx.createRadialGradient(x, y, 3, x, y, 14);
                glowGrad.addColorStop(0, owner === 'player' ? 'rgba(77,240,234,0.5)' : 'rgba(255,123,92,0.5)');
                glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(x, y, 14, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawAimLine(ctx) {
                if (!isAiming || aimStartX === null || aimCurrentX === null) return;
                const dx = aimStartX - aimCurrentX;
                const dy = aimStartY - aimCurrentY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 3) return;
                const power = Math.min(dist / 20, MAX_POWER);
                const nx = dx / dist;
                const ny = dy / dist;
                const aimLen = power * 12;

                // Dotted aim line
                ctx.setLineDash([5, 8]);
                ctx.strokeStyle = 'rgba(255,255,255,0.7)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(ballX, ballY);
                ctx.lineTo(ballX + nx * aimLen, ballY + ny * aimLen);
                ctx.stroke();
                ctx.setLineDash([]);

                // Arrowhead
                const tipX = ballX + nx * aimLen;
                const tipY = ballY + ny * aimLen;
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.beginPath();
                ctx.moveTo(tipX, tipY);
                ctx.lineTo(tipX - nx * 10 + ny * 6, tipY - ny * 10 - nx * 6);
                ctx.lineTo(tipX - nx * 10 - ny * 6, tipY - ny * 10 + nx * 6);
                ctx.closePath();
                ctx.fill();

                // Power glow at ball
                const pGlow = ctx.createRadialGradient(ballX, ballY, 5, ballX, ballY, 20);
                const alpha = power / MAX_POWER;
                pGlow.addColorStop(0, `rgba(255,200,100,${0.7*alpha})`);
                pGlow.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = pGlow;
                ctx.beginPath();
                ctx.arc(ballX, ballY, 20, 0, Math.PI * 2);
                ctx.fill();
            }

            // ==================== GAME LOGIC ====================
            function resetBallForHole() {
                ballX = currentHoleData.startX;
                ballY = currentHoleData.startY;
                ballVX = 0;
                ballVY = 0;
                ballActive = false;
                ballOwner = 'player';
                isAiming = false;
                aimStartX = null;
                aimStartY = null;
                aimCurrentX = null;
                aimCurrentY = null;
                playerHoleStrokes = 0;
                cpuHoleStrokes = 0;
                cpuShotQueue = [];
                cpuShotDelay = 0;
                particles = [];
                updateUI();
            }

            function startHole() {
                currentHoleData = allHoles[holeSequence[currentHoleIndex]];
                resetBallForHole();
                gameState = State.AIMING;
                updateUI();
                updateOverlay();
            }

            function shootBall(power, dirX, dirY) {
                if (ballActive) return;
                const clampedPower = Math.min(power, MAX_POWER);
                ballVX = dirX * clampedPower;
                ballVY = dirY * clampedPower;
                ballActive = true;
                if (ballOwner === 'player') {
                    playerHoleStrokes++;
                    gameState = State.ROLLING;
                } else {
                    cpuHoleStrokes++;
                    gameState = State.COMPUTER_ROLLING;
                }
                updateUI();
            }

            function updateBallPhysics(speedMultiplier = 1) {
                if (!ballActive) return;
                const spd = speedMultiplier;
                ballX += ballVX * spd;
                ballY += ballVY * spd;

                // Friction
                let friction = FRICTION;
                if (isInSand(ballX, ballY)) {
                    friction = 0.94; // much higher friction in sand
                }
                ballVX *= friction;
                ballVY *= friction;

                handleWallCollisions();
                handleObstacleCollisions();

                // Water hazard
                if (isInWater(ballX, ballY)) {
                    spawnParticles(ballX, ballY, 20, 'rgb(100,180,255)');
                    ballX = currentHoleData.startX;
                    ballY = currentHoleData.startY;
                    ballVX = 0;
                    ballVY = 0;
                    ballActive = false;
                    if (ballOwner === 'player') {
                        playerHoleStrokes += 1; // penalty
                    } else {
                        cpuHoleStrokes += 1;
                    }
                    updateUI();
                    if (ballOwner === 'player') {
                        gameState = State.AIMING;
                    } else {
                        handleCPUPostShot();
                    }
                    return;
                }

                // Check if stopped
                const speed = Math.sqrt(ballVX * ballVX + ballVY * ballVY);
                if (speed < MIN_SPEED && ballActive) {
                    ballVX = 0;
                    ballVY = 0;
                    ballActive = false;
                    // Check if in hole
                    if (isInHole(ballX, ballY) && speed < 2.5) {
                        spawnParticles(currentHoleData.holeX, currentHoleData.holeY, 30, 'rgb(255,220,50)');
                        if (ballOwner === 'player') {
                            gameState = State.COMPUTER_TURN;
                            ballOwner = 'cpu';
                            resetBallForCPU();
                            updateUI();
                            updateOverlay();
                            scheduleCPUShot();
                        } else {
                            // CPU finished
                            finishHole();
                        }
                    } else {
                        if (ballOwner === 'player') {
                            gameState = State.AIMING;
                            updateUI();
                            updateOverlay();
                        } else {
                            handleCPUPostShot();
                        }
                    }
                }
            }

            function resetBallForCPU() {
                ballX = currentHoleData.startX;
                ballY = currentHoleData.startY;
                ballVX = 0;
                ballVY = 0;
                ballActive = false;
                cpuHoleStrokes = 0;
                cpuShotQueue = [];
                cpuShotDelay = 0;
            }

            function scheduleCPUShot() {
                cpuShotDelay = 40; // frames delay
            }

            function handleCPUPostShot() {
                if (isInHole(ballX, ballY)) {
                    spawnParticles(currentHoleData.holeX, currentHoleData.holeY, 30, 'rgb(255,220,50)');
                    finishHole();
                } else if (cpuHoleStrokes >= 10) {
                    // CPU gives up after 10 strokes
                    cpuHoleStrokes = 10;
                    finishHole();
                } else {
                    cpuShotDelay = 35;
                    gameState = State.COMPUTER_TURN;
                    updateOverlay();
                }
            }

            function cpuTakeShot() {
                if (ballActive) return;
                const hx = currentHoleData.holeX;
                const hy = currentHoleData.holeY;
                const dx = hx - ballX;
                const dy = hy - ballY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 1) dist || 1;

                // Add error based on distance and randomness
                const angleError = (Math.random() - 0.5) * 0.35; // ±10 degrees
                const powerError = 0.75 + Math.random() * 0.5;
                const basePower = Math.min(dist / 25, MAX_POWER) * powerError;
                const idealNX = dx / dist;
                const idealNY = dy / dist;
                const cosA = Math.cos(angleError);
                const sinA = Math.sin(angleError);
                const nx = idealNX * cosA - idealNY * sinA;
                const ny = idealNX * sinA + idealNY * cosA;
                const power = Math.max(2, Math.min(basePower, MAX_POWER));

                ballOwner = 'cpu';
                shootBall(power, nx, ny);
                updateUI();
            }

            function finishHole() {
                ballActive = false;
                playerTotalStrokes += playerHoleStrokes;
                cpuTotalStrokes += cpuHoleStrokes;
                ballOwner = 'player';
                updateUI();
                if (currentHoleIndex < holeSequence.length - 1) {
                    gameState = State.HOLE_TRANSITION;
                    updateOverlay();
                    setTimeout(() => {
                        currentHoleIndex++;
                        startHole();
                    }, 1800);
                } else {
                    gameState = State.GAME_OVER;
                    updateOverlay();
                }
            }

            function updateUI() {
                if (currentHoleData) {
                    holeInfo.innerHTML = 'Hole <span>' + (currentHoleIndex + 1) + '</span> · Par <span>' + currentHoleData
                        .par + '</span>';
                }
                playerScoreEl.textContent = playerTotalStrokes + (ballOwner === 'player' ? playerHoleStrokes : 0);
                cpuScoreEl.textContent = cpuTotalStrokes + (ballOwner === 'cpu' ? cpuHoleStrokes : 0);
            }

            function updateOverlay() {
                if (gameState === State.MODE_SELECT) {
                    overlay.classList.remove('hidden');
                    overlayPanel.innerHTML = `
                <h2>⛳ Mini Golf Masters</h2>
                <p class="subtitle">Choose your challenge · Play against CPU</p>
                <div class="mode-grid">
                  <button class="mode-btn" data-mode="1"><span class="holes-num">1</span><span class="holes-label">Hole · Random</span></button>
                  <button class="mode-btn" data-mode="3"><span class="holes-num">3</span><span class="holes-label">Holes · Random</span></button>
                  <button class="mode-btn" data-mode="6"><span class="holes-num">6</span><span class="holes-label">Holes · Random</span></button>
                  <button class="mode-btn" data-mode="12"><span class="holes-num">12</span><span class="holes-label">Full Course</span></button>
                </div>`;
                    overlayPanel.querySelectorAll('.mode-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const mode = parseInt(btn.dataset.mode);
                            selectMode(mode);
                        });
                        btn.addEventListener('touchend', (e) => {
                            e.preventDefault();
                            const mode = parseInt(btn.dataset.mode);
                            selectMode(mode);
                        });
                    });
                } else if (gameState === State.COMPUTER_TURN) {
                    overlay.classList.remove('hidden');
                    overlayPanel.innerHTML = `
                <h2>🖥️ CPU's Turn</h2>
                <p class="subtitle">Watch the computer play...</p>
                <p style="color:var(--text2);font-size:0.8rem;">Tap to skip animation</p>`;
                    overlayPanel.addEventListener('click', () => {
                        cpuSimSpeed = 4;
                        overlay.classList.add('hidden');
                    }, { once: true });
                    overlayPanel.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        cpuSimSpeed = 4;
                        overlay.classList.add('hidden');
                    }, { once: true });
                } else if (gameState === State.HOLE_TRANSITION) {
                    overlay.classList.remove('hidden');
                    const pH = playerHoleStrokes;
                    const cH = cpuHoleStrokes;
                    const par = currentHoleData.par;
                    const pDiff = pH - par;
                    const cDiff = cH - par;
                    overlayPanel.innerHTML = `
                <h2>${currentHoleData.name}</h2>
                <p class="subtitle">Hole Complete!</p>
                <div class="result-row"><span>You</span><strong>${pH} stroke${pH!==1?'s':''} (${pDiff===0?'E':pDiff>0?'+'+pDiff:pDiff})</strong></div>
                <div class="result-row"><span>CPU</span><strong>${cH} stroke${cH!==1?'s':''} (${cDiff===0?'E':cDiff>0?'+'+cDiff:pDiff})</strong></div>
                <p style="color:var(--text2);font-size:0.8rem;margin-top:8px;">Next hole coming up...</p>`;
                } else if (gameState === State.GAME_OVER) {
                    overlay.classList.remove('hidden');
                    const pTotal = playerTotalStrokes;
                    const cTotal = cpuTotalStrokes;
                    let resultHTML = '';
                    let badgeClass = '';
                    if (pTotal < cTotal) {
                        resultHTML = '<span class="winner-badge win">🏆 You Win!</span>';
                        badgeClass = 'win';
                    } else if (cTotal < pTotal) {
                        resultHTML = '<span class="winner-badge lose">CPU Wins</span>';
                        badgeClass = 'lose';
                    } else {
                        resultHTML = '<span class="winner-badge tie">🤝 Tie!</span>';
                        badgeClass = 'tie';
                    }
                    const totalPar = holeSequence.reduce((sum, idx) => sum + allHoles[idx].par, 0);
                    overlayPanel.innerHTML = `
                <h2>🏁 Game Over!</h2>
                <p class="subtitle">Final Scorecard · ${holeSequence.length} hole${holeSequence.length!==1?'s':''} · Par ${totalPar}</p>
                <div class="result-row"><span>You</span><strong>${pTotal} (${pTotal-totalPar>=0?'+':''}${pTotal-totalPar})</strong> ${pTotal<cTotal? '👑':''}</div>
                <div class="result-row"><span>CPU</span><strong>${cTotal} (${cTotal-totalPar>=0?'+':''}${cTotal-totalPar})</strong> ${cTotal<pTotal? '👑':''}</div>
                <div style="margin-top:12px;">${resultHTML}</div>
                <button class="btn-primary" id="btnReplay" style="margin-top:16px;">🔄 Play Again</button>`;
                    setTimeout(() => {
                        const replayBtn = document.getElementById('btnReplay');
                        if (replayBtn) {
                            replayBtn.addEventListener('click', resetGame);
                            replayBtn.addEventListener('touchend', (e) => {
                                e.preventDefault();
                                resetGame();
                            });
                        }
                    }, 100);
                } else {
                    overlay.classList.add('hidden');
                }
            }

            function selectMode(mode) {
                selectedMode = mode;
                playerTotalStrokes = 0;
                cpuTotalStrokes = 0;
                currentHoleIndex = 0;
                // Build hole sequence
                const indices = Array.from({ length: 12 }, (_, i) => i);
                shuffleArray(indices);
                if (mode === 12) {
                    holeSequence = indices;
                } else if (mode === 6) {
                    holeSequence = indices.slice(0, 6);
                } else if (mode === 3) {
                    holeSequence = indices.slice(0, 3);
                } else {
                    holeSequence = [indices[0]];
                }
                cpuSimSpeed = 1.6;
                overlay.classList.add('hidden');
                startHole();
            }

            function resetGame() {
                gameState = State.MODE_SELECT;
                selectedMode = null;
                holeSequence = [];
                currentHoleIndex = 0;
                playerTotalStrokes = 0;
                cpuTotalStrokes = 0;
                playerHoleStrokes = 0;
                cpuHoleStrokes = 0;
                currentHoleData = null;
                ballActive = false;
                ballOwner = 'player';
                isAiming = false;
                particles = [];
                cpuShotQueue = [];
                cpuShotDelay = 0;
                cpuSimSpeed = 1.6;
                updateUI();
                updateOverlay();
                holeInfo.innerHTML = 'Hole <span>-</span> · Par <span>-</span>';
                playerScoreEl.textContent = '0';
                cpuScoreEl.textContent = '0';
            }

            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
            }

            // ==================== INPUT HANDLING ====================
            function getEventPos(e) {
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return screenToInternal(clientX, clientY);
            }

            function handlePointerDown(e) {
                if (gameState !== State.AIMING) return;
                if (ballActive) return;
                const pos = getEventPos(e);
                const dx = pos.x - ballX;
                const dy = pos.y - ballY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 40) {
                    isAiming = true;
                    aimStartX = pos.x;
                    aimStartY = pos.y;
                    aimCurrentX = pos.x;
                    aimCurrentY = pos.y;
                    powerIndicator.style.opacity = '1';
                }
            }

            function handlePointerMove(e) {
                if (!isAiming) return;
                const pos = getEventPos(e);
                aimCurrentX = pos.x;
                aimCurrentY = pos.y;
                const dx = aimStartX - aimCurrentX;
                const dy = aimStartY - aimCurrentY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const power = Math.min(dist / 20, MAX_POWER);
                const pct = (power / MAX_POWER) * 100;
                powerFill.style.width = pct + '%';
                if (power > MAX_POWER * 0.85) {
                    powerFill.style.background = 'linear-gradient(90deg, #ff5e8a, #ff3d5c)';
                } else if (power > MAX_POWER * 0.5) {
                    powerFill.style.background = 'linear-gradient(90deg, #f0c040, #ff8c40)';
                } else {
                    powerFill.style.background = 'linear-gradient(90deg, #00e5a0, #4df0ea)';
                }
            }

            function handlePointerUp(e) {
                if (!isAiming || gameState !== State.AIMING) {
                    isAiming = false;
                    powerIndicator.style.opacity = '0';
                    powerFill.style.width = '0%';
                    return;
                }
                const pos = getEventPos(e);
                aimCurrentX = pos.x;
                aimCurrentY = pos.y;
                const dx = aimStartX - aimCurrentX;
                const dy = aimStartY - aimCurrentY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const power = Math.min(dist / 20, MAX_POWER);
                if (power > 0.4 && dist > 2) {
                    const nx = dx / dist;
                    const ny = dy / dist;
                    shootBall(power, nx, ny);
                    spawnParticles(ballX, ballY, 8, 'rgb(255,255,255)');
                }
                isAiming = false;
                aimStartX = null;
                aimStartY = null;
                aimCurrentX = null;
                aimCurrentY = null;
                powerIndicator.style.opacity = '0';
                powerFill.style.width = '0%';
                updateUI();
                updateOverlay();
            }

            canvas.addEventListener('mousedown', handlePointerDown);
            canvas.addEventListener('mousemove', handlePointerMove);
            canvas.addEventListener('mouseup', handlePointerUp);
            canvas.addEventListener('mouseleave', handlePointerUp);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault();
                handlePointerDown(e); }, { passive: false });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault();
                handlePointerMove(e); }, { passive: false });
            canvas.addEventListener('touchend', (e) => { e.preventDefault();
                handlePointerUp(e); }, { passive: false });
            canvas.addEventListener('touchcancel', (e) => { e.preventDefault();
                handlePointerUp(e); }, { passive: false });

            // ==================== GAME LOOP ====================
            function updateMovingObstacles() {
                if (!currentHoleData) return;
                for (const mo of currentHoleData.movingObs) {
                    mo.angle += mo.speed;
                    if (mo.type === 'oscillator') {
                        mo.oscillateX = mo.baseX + Math.sin(mo.angle) * mo.rangeY;
                        mo.oscillateY = mo.baseY + Math.cos(mo.angle) * mo.rangeY;
                    }
                }
            }

            function gameLoop() {
                updateMovingObstacles();
                updateParticles();

                if (gameState === State.ROLLING && ballActive && ballOwner === 'player') {
                    updateBallPhysics(1);
                    if (!ballActive && gameState === State.ROLLING) {
                        updateUI();
                        updateOverlay();
                    }
                }

                if (gameState === State.COMPUTER_ROLLING && ballActive && ballOwner === 'cpu') {
                    updateBallPhysics(cpuSimSpeed);
                    if (!ballActive && gameState === State.COMPUTER_ROLLING) {
                        updateUI();
                        updateOverlay();
                    }
                }

                if (gameState === State.COMPUTER_TURN && !ballActive && ballOwner === 'cpu') {
                    if (cpuShotDelay > 0) {
                        cpuShotDelay--;
                    } else {
                        cpuTakeShot();
                        overlay.classList.add('hidden');
                        cpuSimSpeed = 1.6;
                    }
                }

                // Render
                ctx.clearRect(0, 0, INTERNAL_W, INTERNAL_H);
                if (currentHoleData) {
                    drawHole(ctx);
                    if (ballOwner === 'player' || gameState === State.ROLLING || gameState === State.AIMING) {
                        drawBall(ctx, ballX, ballY, ballOwner);
                    }
                    if (ballOwner === 'cpu' && (gameState === State.COMPUTER_ROLLING || gameState === State
                            .COMPUTER_TURN)) {
                        drawBall(ctx, ballX, ballY, 'cpu');
                    }
                    if (gameState === State.AIMING && ballOwner === 'player') {
                        drawAimLine(ctx);
                    }
                }
                drawParticles(ctx);

                // Hole name on canvas
                if (currentHoleData && gameState !== State.MODE_SELECT && gameState !== State.GAME_OVER) {
                    ctx.fillStyle = 'rgba(255,255,255,0.8)';
                    ctx.font = '600 14px "Segoe UI", sans-serif';
                    ctx.textAlign = 'left';
                    ctx.fillText(currentHoleData.name, 14, 24);
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.font = '11px "Segoe UI", sans-serif';
                    const strokes = ballOwner === 'player' ? playerHoleStrokes : cpuHoleStrokes;
                    const label = ballOwner === 'player' ? 'Your strokes: ' : 'CPU strokes: ';
                    ctx.fillText(label + strokes, 14, 44);
                }

                requestAnimationFrame(gameLoop);
            }

            // ==================== INIT ====================
            function init() {
                resize();
                resetGame();
                updateOverlay();
                powerIndicator.style.opacity = '0';
                powerFill.style.width = '0%';
                requestAnimationFrame(gameLoop);
            }

            init();
        })();
    </script>
</body>
</html>
